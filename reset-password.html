<!DOCTYPE html>                                                                                                                                            
  <html lang="fr">                                          
  <head>
  <meta charset="UTF-8">                                                                                                                                     
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Phyziq — Réinitialisation du mot de passe</title>                                                                                                   
  <style>                                                                                                                                                    
    body { font-family: -apple-system, system-ui, sans-serif; background: #0a0a0a; color: #fff; margin: 0; padding: 24px; min-height: 100vh; display: flex;
  flex-direction: column; align-items: center; justify-content: center; }                                                                                    
    .card { max-width: 400px; width: 100%; background: #1a1a1a; padding: 32px; border-radius: 16px; }
    h1 { font-size: 22px; margin: 0 0 12px; }                                                                                                                
    p { color: #aaa; line-height: 1.5; }                                                                                                                     
    input { width: 100%; box-sizing: border-box; padding: 14px; background: #0a0a0a; border: 1px solid #333; border-radius: 8px; color: #fff; font-size:     
  16px; margin-bottom: 12px; }                                                                                                                               
    button { width: 100%; padding: 14px; background: #007AFF; color: #fff; border: 0; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer;
   }                                                                                                                                                         
    button:disabled { opacity: 0.5; cursor: not-allowed; }  
    .ok { color: #4ade80; margin-top: 12px; }                                                                                                                
    .err { color: #f87171; margin-top: 12px; }              
  </style>                                                                                                                                                   
  </head>                                                   
  <body>                                                                                                                                                     
  <div class="card">                                        
    <h1>Nouveau mot de passe</h1>
    <p>Saisis ton nouveau mot de passe Phyziq.</p>
    <input id="pw" type="password" placeholder="Nouveau mot de passe (min. 8 caractères)" minlength="8">                                                     
    <button id="submitBtn">Mettre à jour</button>                                                                                                            
    <div id="msg"></div>                                                                                                                                     
  </div>                                                                                                                                                     
  <script type="module">                                                                                                                                     
  import { createClient } from 'https://esm.sh/@supabase/supabase-js@2.49.1';
                                                                                                                                                             
  const sb = createClient(
    'https://taqibxvguatdlzlgcphr.supabase.co',                                                                                                              
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRhcWlieHZndWF0ZGx6bGdjcGhyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAxMzE2NDcsImV4cCI6MjA
  4NTcwNzY0N30.A_6ztknRe6HfcCh5wr4PjMoJzutNK_WMk0wG1hDOiMY',                                                                                                 
    { auth: { detectSessionInUrl: true, flowType: 'implicit' } }                                                                                             
  );                                                                                                                                                         
                                                                                                                                                             
  const btn = document.getElementById('submitBtn');
  const pwInput = document.getElementById('pw');                                                                                                             
  const msg = document.getElementById('msg');               
                                                                                                                                                             
  btn.addEventListener('click', async () => {
    const pw = pwInput.value;                                                                                                                                
    msg.className = '';                                     
    msg.textContent = '';
    if (pw.length < 8) {                                                                                                                                     
      msg.className = 'err';
      msg.textContent = 'Mot de passe trop court (min. 8 caractères).';                                                                                      
      return;                                                                                                                                                
    }
    btn.disabled = true;                                                                                                                                     
    btn.textContent = 'Mise à jour...';                     
    try {
      const { error } = await sb.auth.updateUser({ password: pw });
      if (error) {                                                                                                                                           
        msg.className = 'err';
        msg.textContent = error.message || 'Erreur. Réessaie.';                                                                                              
        btn.disabled = false;                                                                                                                                
        btn.textContent = 'Mettre à jour';
      } else {                                                                                                                                               
        msg.className = 'ok';                                                                                                                                
        msg.textContent = '✓ Mot de passe mis à jour. Ouvre l\'app Phyziq et connecte-toi avec ton nouveau mot de passe.';
        btn.style.display = 'none';                                                                                                                          
        pwInput.disabled = true;                                                                                                                             
      }                                                                                                                                                      
    } catch (e) {                                                                                                                                            
      msg.className = 'err';                                
      msg.textContent = 'Erreur réseau. Vérifie ta connexion.';
      btn.disabled = false;                                                                                                                                  
      btn.textContent = 'Mettre à jour';
    }                                                                                                                                                        
  });                                                       
                                                                                                                                                             
  // Permet aussi Enter pour submit                                                                                                                          
  pwInput.addEventListener('keypress', (e) => {                                                                                                              
    if (e.key === 'Enter') btn.click();                                                                                                                      
  });                                                       
  </script>
  </body>
  </html>
