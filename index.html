<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Phyziq — Télécharger l'app</title>
  <meta name="description" content="Analyse ton physique par IA et génère un programme de musculation sur mesure." />

  <!-- Open Graph (aperçu TikTok / Instagram / Twitter) -->
  <meta property="og:title" content="Phyziq — Programme de musculation par IA" />
  <meta property="og:description" content="Scanne ton physique, analyse tes forces génétiques et génère un programme sur mesure." />
  <meta property="og:image" content="https://get.phyziq.app/preview.png" />
  <meta property="og:url" content="https://get.phyziq.app" />
  <meta property="og:type" content="website" />
  <meta name="twitter:card" content="summary_large_image" />

  <!-- Redirect automatique iOS vers App Store après 2s si User-Agent iOS -->
  <script>
    const ua = navigator.userAgent;
    const isIOS = /iPhone|iPad|iPod/.test(ua);
    if (isIOS) {
      setTimeout(() => {
        window.location.href = 'https://apps.apple.com/app/id6759914168';
      }, 1800);
    }
  </script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0A0A0A;
      color: #FFFFFF;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }

    .logo {
      width: 80px;
      height: 80px;
      background: #111;
      border-radius: 20px;
      border: 1px solid #222;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      overflow: hidden;
    }

    .logo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 20px;
    }

    .tag {
      display: inline-block;
      background: #1A1A1A;
      border: 1px solid #333;
      color: #9EFF72;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 4px 12px;
      border-radius: 20px;
      margin-bottom: 16px;
    }

    h1 {
      font-size: clamp(28px, 6vw, 44px);
      font-weight: 800;
      letter-spacing: -0.5px;
      line-height: 1.15;
      margin-bottom: 16px;
      background: linear-gradient(135deg, #FFFFFF 60%, #9EFF72);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    p {
      color: #888;
      font-size: 16px;
      line-height: 1.6;
      max-width: 340px;
      margin: 0 auto 40px;
    }

    .buttons {
      display: flex;
      flex-direction: column;
      gap: 14px;
      width: 100%;
      max-width: 320px;
      margin: 0 auto;
    }

    .btn-ios {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: #FFFFFF;
      color: #000000;
      font-size: 16px;
      font-weight: 700;
      padding: 16px 24px;
      border-radius: 16px;
      text-decoration: none;
      transition: transform 0.15s, opacity 0.15s;
    }

    .btn-ios:active { transform: scale(0.97); opacity: 0.9; }

    .btn-ios svg { flex-shrink: 0; }

    .btn-android {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: transparent;
      color: #555;
      font-size: 15px;
      font-weight: 600;
      padding: 16px 24px;
      border-radius: 16px;
      border: 1px solid #222;
      cursor: default;
    }

    .soon-badge {
      background: #1A1A1A;
      color: #666;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      padding: 2px 8px;
      border-radius: 6px;
      border: 1px solid #333;
    }

    .features {
      display: flex;
      gap: 20px;
      margin-top: 48px;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 400px;
    }

    .feature {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    .feature-icon {
      font-size: 22px;
    }

    .feature-text {
      color: #555;
      font-size: 12px;
      font-weight: 500;
    }

    footer {
      margin-top: 56px;
      color: #333;
      font-size: 12px;
    }

    footer a { color: #444; text-decoration: none; }
    footer a:hover { color: #666; }
  </style>
</head>
<body>

  <!-- Logo -->
  <div class="logo">
    <img src="https://get.phyziq.app/icon.png" alt="Phyziq" onerror="this.style.display='none'" />
  </div>

  <!-- Badge -->
  <div class="tag">IA · Musculation</div>

  <!-- Titre -->
  <h1>Ton programme,<br>calibré par l'IA</h1>

  <!-- Sous-titre -->
  <p>Phyziq analyse ton physique en quelques photos et génère un programme de musculation adapté à ta morphologie.</p>

  <!-- Boutons -->
  <div class="buttons">

    <!-- iOS -->
    <a class="btn-ios" href="https://apps.apple.com/app/id6759914168" target="_blank" rel="noopener">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="black">
        <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/>
      </svg>
      Télécharger sur iOS
    </a>

    <!-- Android -->
    <div class="btn-android">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="#555">
        <path d="M6 18c0 .55.45 1 1 1h1v3.5c0 .83.67 1.5 1.5 1.5s1.5-.67 1.5-1.5V19h2v3.5c0 .83.67 1.5 1.5 1.5s1.5-.67 1.5-1.5V19h1c.55 0 1-.45 1-1V8H6v10zM3.5 8C2.67 8 2 8.67 2 9.5v7c0 .83.67 1.5 1.5 1.5S5 17.33 5 16.5v-7C5 8.67 4.33 8 3.5 8zm17 0c-.83 0-1.5.67-1.5 1.5v7c0 .83.67 1.5 1.5 1.5s1.5-.67 1.5-1.5v-7c0-.83-.67-1.5-1.5-1.5zm-4.97-5.84l1.3-1.3c.2-.2.2-.51 0-.71-.2-.2-.51-.2-.71 0l-1.48 1.48C13.85 1.23 12.95 1 12 1c-.96 0-1.86.23-2.66.63L7.85.15c-.2-.2-.51-.2-.71 0-.2.2-.2.51 0 .71l1.31 1.31C6.97 3.26 6 5.01 6 7h12c0-1.99-.97-3.75-2.47-4.84zM10 5H9V4h1v1zm5 0h-1V4h1v1z"/>
      </svg>
      Android
      <span class="soon-badge">Bientôt</span>
    </div>

  </div>

  <!-- Features -->
  <div class="features">
    <div class="feature">
      <div class="feature-icon">📸</div>
      <div class="feature-text">Scan IA</div>
    </div>
    <div class="feature">
      <div class="feature-icon">🧬</div>
      <div class="feature-text">Morphologie</div>
    </div>
    <div class="feature">
      <div class="feature-icon">💪</div>
      <div class="feature-text">Programme sur mesure</div>
    </div>
    <div class="feature">
      <div class="feature-icon">📈</div>
      <div class="feature-text">Progression</div>
    </div>
  </div>

  <!-- Footer -->
  <footer>
    <a href="https://legal.phyziq.app">Mentions légales</a> · © 2026 Phyziq
  </footer>

</body>
</html>
